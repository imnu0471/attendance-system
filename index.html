<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能培训签到系统</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
body{font-family:'Noto Sans SC',sans-serif;background:#0a0e1a;color:#e2e8f0;margin:0;padding:0}
nav{background:rgba(17,24,39,0.8);padding:16px 32px;border-bottom:1px solid #1e2d45;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:18px;font-weight:700}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border:none;background:transparent;color:#64748b;cursor:pointer;border-radius:7px}
.nav-tab.active{background:#00d4ff;color:#000;font-weight:700}
.page{display:none;padding:40px 32px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.config-card{background:#111827;border:1px solid #1e2d45;border-radius:20px;padding:28px;margin-bottom:24px}
.config-card h3{font-size:16px;font-weight:700;margin-bottom:20px;color:#00d4ff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;color:#64748b;font-weight:500}
.form-group input{background:#1a2235;border:1px solid #1e2d45;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-family:inherit;font-size:14px;outline:none}
.form-group input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
.btn{padding:10px 20px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#00d4ff;color:#000}
.btn-primary:hover{background:#00b8d9}
.btn-secondary{background:#1a2235;color:#e2e8f0;border:1px solid #1e2d45}
.btn-secondary:hover{background:#1e2d45}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.qr-card{background:#111827;border:1px solid #1e2d45;border-radius:20px;padding:32px;text-align:center}
.qr-card-title{font-size:22px;font-weight:700;margin-bottom:6px;color:#10b981}
.qr-card-sub{font-size:13px;color:#64748b;margin-bottom:24px}
.qr-wrapper{display:inline-block;padding:16px;background:#fff;border-radius:16px;margin-bottom:20px}
.qr-url{font-family:monospace;font-size:11px;color:#64748b;background:#1a2235;padding:8px 12px;border-radius:8px;word-break:break-all;border:1px solid #1e2d45;margin-bottom:16px}
.scan-container{max-width:480px;margin:0 auto;text-align:center}
.scan-header{margin-bottom:32px}
.scan-header h2{font-size:28px;font-weight:900;margin-bottom:8px}
.name-input-section{background:#111827;border:1px solid #1e2d45;border-radius:20px;padding:32px;margin-bottom:24px}
.name-input-section input{width:100%;background:#1a2235;border:2px solid #1e2d45;border-radius:12px;padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:18px;font-weight:500;outline:none;text-align:center;margin-bottom:16px}
.name-input-section input:focus{border-color:#00d4ff;box-shadow:0 0 0 4px rgba(0,212,255,0.1)}
.location-btn{width:100%;padding:14px;border-radius:12px;border:2px dashed #1e2d45;background:#1a2235;color:#64748b;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:16px;transition:all 0.2s}
.location-btn:hover{border-color:#00d4ff;color:#e2e8f0}
.location-btn.active{border-style:solid;border-color:#10b981;background:rgba(16,185,129,0.1);color:#10b981}
.location-info{font-size:12px;color:#64748b;margin-bottom:12px;display:none}
.location-info.show{display:flex;align-items:center;justify-content:center;gap:4px}
.submit-btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.2s;background:#10b981;color:#fff}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.submit-btn:disabled{background:#1a2235;color:#64748b;cursor:not-allowed}
.success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.success-overlay.show{display:flex}
.success-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;background:rgba(16,185,129,0.2);border:3px solid #10b981}
.success-text{font-size:24px;font-weight:700}
.success-sub{font-size:16px;color:#64748b}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:20px;text-align:center}
.stat-value{font-size:32px;font-weight:900;font-family:monospace;margin-bottom:4px;color:#00d4ff}
.stat-label{font-size:12px;color:#64748b;font-weight:500}
.filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{background:#111827;border:1px solid #1e2d45;border-radius:10px;padding:9px 14px;color:#e2e8f0;font-family:inherit;font-size:14px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#00d4ff}
.filter-bar input{flex:1;min-width:160px}
.table-wrapper{background:#111827;border:1px solid #1e2d45;border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:#1a2235;border-bottom:1px solid #1e2d45}
th{padding:14px 16px;text-align:left;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em}
td{padding:14px 16px;font-size:14px;border-bottom:1px solid rgba(30,45,69,0.5)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.2)}
.empty-state{text-align:center;padding:60px 20px;color:#64748b}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:32px;right:32px;background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:500;box-shadow:0 10px 40px rgba(0,0,0,0.4);transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:9999;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:#10b981;color:#10b981}
.page-title{margin-bottom:32px}
.page-title h1{font-size:32px;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-title p{color:#64748b;font-size:15px}
@media(max-width:768px){.qr-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
<div class="nav-brand">智能培训签到系统</div>
<div class="nav-tabs">
<button class="nav-tab active" onclick="showPage('admin')">管理后台</button>
<button class="nav-tab" onclick="showPage('records')">签到记录</button>
</div>
</nav>

<div id="page-admin" class="page active">
<div class="page-title">
<h1>培训签到二维码管理</h1>
<p>生成签到/签退二维码，学员扫码即可完成打卡</p>
</div>

<div class="config-card">
<h3>基本配置</h3>
<div class="form-row">
<div class="form-group"><label>培训名称</label><input type="text" id="orgName" value="我的培训" placeholder="输入培训名称"></div>
<div class="form-group"><label>访问地址</label><input type="text" id="baseUrl" placeholder="自动获取..." readonly></div>
</div>
<button class="btn btn-primary" onclick="generateQRCodes()">重新生成二维码</button>
</div>

<div class="config-card">
<h3>位置限定配置</h3>
<div class="form-row">
<div class="form-group"><label>启用位置限定</label><input type="checkbox" id="enableLocation" onchange="saveLocationConfig()"></div>
<div class="form-group"><label>允许半径(米)</label><input type="number" id="radiusMeters" value="200" onchange="saveLocationConfig()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>中心经度</label><input type="text" id="centerLng" value="111.796523" onchange="saveLocationConfig()"></div>
<div class="form-group"><label>中心纬度</label><input type="text" id="centerLat" value="40.486366" onchange="saveLocationConfig()"></div>
</div>
</div>

<div class="qr-grid">
<div class="qr-card">
<div class="qr-card-title">✅ 培训签到二维码</div>
<div class="qr-card-sub">学员入场时扫描</div>
<div class="qr-wrapper"><div id="qr-checkin"></div></div>
<div class="qr-url" id="url-checkin"></div>
<div style="display:flex;gap:8px;justify-content:center">
<button class="btn btn-secondary" onclick="downloadQR('checkin')">下载</button>
<button class="btn btn-secondary" onclick="copyUrl('checkin')">复制链接</button>
</div>
</div>

<div class="qr-card">
<div class="qr-card-title">🚪 培训签退二维码</div>
<div class="qr-card-sub">学员离场时扫描</div>
<div class="qr-wrapper"><div id="qr-checkout"></div></div>
<div class="qr-url" id="url-checkout"></div>
<div style="display:flex;gap:8px;justify-content:center">
<button class="btn btn-secondary" onclick="downloadQR('checkout')">下载</button>
<button class="btn btn-secondary" onclick="copyUrl('checkout')">复制链接</button>
</div>
</div>
</div>
</div>

<div id="page-records" class="page">
<h2>📊 签到记录</h2>
<div style="margin-bottom:20px">
<button class="btn btn-secondary" onclick="exportCSV()">导出 CSV</button>
<button class="btn btn-secondary" onclick="clearRecords()" style="background:#ef4444;color:#fff">清空记录</button>
</div>

<div class="stats-grid">
<div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">总记录数</div></div>
<div class="stat-card"><div class="stat-value" id="stat-checkin">0</div><div class="stat-label">今日签到</div></div>
<div class="stat-card"><div class="stat-value" id="stat-checkout">0</div><div class="stat-label">今日签退</div></div>
<div class="stat-card"><div class="stat-value" id="stat-people">0</div><div class="stat-label">今日人数</div></div>
</div>

<div class="filter-bar">
<input type="text" id="filter-name" placeholder="搜索姓名..." oninput="renderTable()">
<select id="filter-type" onchange="renderTable()"><option value="">全部类型</option><option value="checkin">签到</option><option value="checkout">签退</option></select>
<input type="date" id="filter-date" onchange="renderTable()">
<button class="btn btn-secondary" onclick="clearFilters()">清除筛选</button>
</div>

<div class="table-wrapper">
<table>
<thead><tr><th>#</th><th>姓名</th><th>类型</th><th>日期</th><th>时间</th><th>距离</th><th>备注</th></tr></thead>
<tbody id="records-tbody"></tbody>
</table>
<div id="empty-state" class="empty-state" style="display:none"><div class="icon">📋</div><p>暂无签到记录</p></div>
</div>
</div>

<div id="page-scan" class="page">
<div class="scan-container">
<div class="scan-header">
<h2 id="scan-title">培训签到</h2>
<p style="color:#64748b;font-size:14px" id="scan-org"></p>
</div>

<div class="name-input-section">
<p style="font-size:15px;color:#64748b;margin-bottom:16px">请输入您的姓名</p>
<input type="text" id="scan-name" placeholder="姓名" maxlength="20" autocomplete="off">
<input type="text" id="scan-remark" placeholder="备注（可选）" maxlength="50" style="width:100%;background:#1a2235;border:2px solid #1e2d45;border-radius:12px;padding:10px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;outline:none;text-align:center;margin-bottom:16px">

<button class="location-btn" id="locationBtn" onclick="getLocation()">📍 点击获取位置</button>
<div class="location-info" id="locationInfo"><span id="locationStatus">等待获取位置...</span></div>

<button class="submit-btn" id="scan-submit" onclick="submitAttendance()" disabled>请先获取位置</button>
</div>
</div>
</div>

<div class="success-overlay" id="success-overlay">
<div class="success-icon">✓</div>
<div class="success-text" id="success-text">签到成功</div>
<div class="success-sub" id="success-sub"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='attendance_records';
const CONFIG_KEY='attendance_config';
const LOCATION_CONFIG_KEY='attendance_location_config';

function getRecords(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}
function saveRecords(r){localStorage.setItem(STORAGE_KEY,JSON.stringify(r))}
function getConfig(){return JSON.parse(localStorage.getItem(CONFIG_KEY)||'{}')}
function saveConfig(c){localStorage.setItem(CONFIG_KEY,JSON.stringify(c))}
function getLocationConfig(){return JSON.parse(localStorage.getItem(LOCATION_CONFIG_KEY)||'{}')}
function saveLocationConfig(){const c={enabled:document.getElementById('enableLocation').checked,lng:document.getElementById('centerLng').value,lat:document.getElementById('centerLat').value,radius:parseInt(document.getElementById('radiusMeters').value)||200};localStorage.setItem(LOCATION_CONFIG_KEY,JSON.stringify(c))}

function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');const t=document.querySelectorAll('.nav-tab');if(n==='admin')t[0].classList.add('active');else if(n==='records'){t[1].classList.add('active');updateStats();renderTable()}}

let qrCheckin=null,qrCheckout=null;
function generateQRCodes(){const orgName=document.getElementById('orgName').value||'我的培训';saveConfig({orgName});const base=window.location.href.split('?')[0];const checkinUrl=base+'?type=checkin&org='+encodeURIComponent(orgName);const checkoutUrl=base+'?type=checkout&org='+encodeURIComponent(orgName);document.getElementById('url-checkin').textContent=checkinUrl;document.getElementById('url-checkout').textContent=checkoutUrl;document.getElementById('qr-checkin').innerHTML='';document.getElementById('qr-checkout').innerHTML='';qrCheckin=new QRCode(document.getElementById('qr-checkin'),{text:checkinUrl,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});qrCheckout=new QRCode(document.getElementById('qr-checkout'),{text:checkoutUrl,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});showToast('二维码已生成','success')}

function downloadQR(t){const c=document.getElementById('qr-'+t);const i=c.querySelector('img')||c.querySelector('canvas');if(!i)return;const l=document.createElement('a');if(i.tagName==='CANVAS'){l.href=i.toDataURL('image/png')}else{l.href=i.src}l.download=(t==='checkin'?'签到':'签退')+'二维码.png';l.click()}

function copyUrl(t){const u=document.getElementById('url-'+t).textContent;navigator.clipboard.writeText(u).then(()=>showToast('链接已复制','success'))}

let currentType='checkin',userLat=null,userLng=null,userDistance=null;

function initScanPage(){const p=new URLSearchParams(window.location.search);const t=p.get('type');const org=p.get('org')||'我的培训';if(!t)return;document.querySelector('nav').style.display='none';document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-scan').classList.add('active');currentType=t;const isCheckin=t==='checkin';document.getElementById('scan-title').textContent=isCheckin?'培训签到':'培训签退';document.getElementById('scan-org').textContent=org;document.getElementById('scan-submit').textContent=isCheckin?'确认签到':'确认签退';const lc=getLocationConfig();if(!lc.enabled){document.getElementById('locationBtn').style.display='none';document.getElementById('locationInfo').style.display='none';document.getElementById('scan-submit').disabled=false}}

function getLocation(){const btn=document.getElementById('locationBtn');const info=document.getElementById('locationInfo');const status=document.getElementById('locationStatus');const submit=document.getElementById('scan-submit');if(!navigator.geolocation){showToast('浏览器不支持定位','error');return}btn.textContent='获取中...';btn.disabled=true;navigator.geolocation.getCurrentPosition((pos)=>{userLat=pos.coords.latitude;userLng=pos.coords.longitude;const lc=getLocationConfig();if(lc.enabled&&lc.lat&&lc.lng&&lc.radius){userDistance=getDistance(userLat,userLng,parseFloat(lc.lat),parseFloat(lc.lng));info.classList.add('show');btn.style.display='none';if(userDistance<=parseInt(lc.radius)){status.textContent='✅ 位置验证成功 (距离'+Math.round(userDistance)+'米)';submit.disabled=false;showToast('位置验证成功','success')}else{status.textContent='❌ 超出范围 (距离'+Math.round(userDistance)+'米)';submit.disabled=true;showToast('距离超出允许范围','error')}}else{info.classList.add('show');btn.style.display='none';status.textContent='✅ 位置获取成功';submit.disabled=false;showToast('位置获取成功','success')}},(err)=>{btn.textContent='点击重试';btn.disabled=false;showToast('获取位置失败','error')},{enableHighAccuracy:true,timeout:10000})}

function getDistance(lat1,lng1,lat2,lng2){const R=6371000;const phi1=lat1*Math.PI/180,phi2=lat2*Math.PI/180;const dPhi=(lat2-lat1)*Math.PI/180;const dLambda=(lng2-lng1)*Math.PI/180;const a=Math.sin(dPhi/2)*Math.sin(dPhi/2)+Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLambda/2)*Math.sin(dLambda/2);const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return R*c}

function submitAttendance(){const name=document.getElementById('scan-name').value.trim();const remark=document.getElementById('scan-remark').value.trim();if(!name){showToast('请输入姓名','error');return}const lc=getLocationConfig();if(lc.enabled&&userDistance&&userDistance>lc.radius){showToast('不在允许范围内','error');return}const now=new Date();const record={id:Date.now(),name,type:currentType,date:now.toLocaleDateString('zh-CN'),time:now.toLocaleTimeString('zh-CN'),timestamp:now.getTime(),remark:remark||'',lat:userLat,lng:userLng,distance:userDistance?Math.round(userDistance):null};const records=getRecords();records.unshift(record);saveRecords(records);const overlay=document.getElementById('success-overlay');const text=document.getElementById('success-text');const sub=document.getElementById('success-sub');text.textContent=name+(currentType==='checkin'?' 培训签到成功':' 培训签退成功');sub.textContent=record.date+' '+record.time;overlay.classList.add('show');setTimeout(()=>{overlay.classList.remove('show');document.getElementById('scan-name').value='';document.getElementById('scan-remark').value=''},2500)}

function updateStats(){const records=getRecords();const today=new Date().toLocaleDateString('zh-CN');const todayRecords=records.filter(r=>r.date===today);const todayCheckin=todayRecords.filter(r=>r.type==='checkin');const todayCheckout=todayRecords.filter(r=>r.type==='checkout');const todayPeople=new Set(todayRecords.map(r=>r.name)).size;document.getElementById('stat-total').textContent=records.length;document.getElementById('stat-checkin').textContent=todayCheckin.length;document.getElementById('stat-checkout').textContent=todayCheckout.length;document.getElementById('stat-people').textContent=todayPeople}

function renderTable(){const records=getRecords();const nameFilter=document.getElementById('filter-name').value.toLowerCase();const typeFilter=document.getElementById('filter-type').value;const dateFilter=document.getElementById('filter-date').value;let filtered=records.filter(r=>{if(nameFilter&&!r.name.toLowerCase().includes(nameFilter))return false;if(typeFilter&&r.type!==typeFilter)return false;if(dateFilter){const d=new Date(r.timestamp);const dStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(dStr!==dateFilter)return false}return true});const tbody=document.getElementById('records-tbody');const empty=document.getElementById('empty-state');if(filtered.length===0){tbody.innerHTML='';empty.style.display='block';return}empty.style.display='none';tbody.innerHTML=filtered.map((r,i)=>'<tr><td>'+(filtered.length-i)+'</td><td>'+r.name+'</td><td><span class="badge">'+(r.type==='checkin'?'签到':'签退')+'</span></td><td>'+r.date+'</td><td>'+r.time+'</td><td>'+(r.distance!==null?r.distance+'米':'—')+'</td><td>'+r.remark+'</td></tr>').join('')}

function clearFilters(){document.getElementById('filter-name').value='';document.getElementById('filter-type').value='';document.getElementById('filter-date').value='';renderTable()}

function clearRecords(){if(!confirm('确定要清空所有记录吗？'))return;saveRecords([]);updateStats();renderTable();showToast('记录已清空','success')}

function exportCSV(){const records=getRecords();if(records.length===0){showToast('暂无记录','error');return}const header='序号,姓名,类型,日期,时间,距离(米),备注\n';const rows=records.map((r,i)=>i+1+',"'+r.name+'","'+(r.type==='checkin'?'签到':'签退')+'","'+r.date+'","'+r.time+'","'+(r.distance||'')+'","'+r.remark+'"').join('\n');const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download='培训签到记录_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';link.click();URL.revokeObjectURL(url);showToast('导出成功','success')}

function showToast(m,t='success'){const toast=document.getElementById('toast');toast.textContent=(t==='success'?'✓ ':'✕ ')+m;toast.className='toast '+t+' show';setTimeout(()=>toast.classList.remove('show'),2500)}

window.addEventListener('DOMContentLoaded',()=>{const p=new URLSearchParams(window.location.search);if(p.get('type')){initScanPage();return}const config=getConfig();document.getElementById('orgName').value=config.orgName||'我的培训';document.getElementById('baseUrl').value=window.location.href.split('?')[0];generateQRCodes();updateStats();renderTable()})
</script>
</body>
</html>
